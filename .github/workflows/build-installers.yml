name: Build Installers

on:
  workflow_dispatch:
    inputs:
      target:
        description: "要打包的平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - mac
      version:
        description: "可选版本号，例如 0.1.1；留空则读取 order_bot/__init__.py"
        required: false
        type: string
      build_mac_dmg:
        description: "是否额外生成 macOS .dmg（默认不生成，安装用 .pkg 即可）"
        required: true
        default: false
        type: boolean
      publish_release:
        description: "是否发布到 GitHub Releases 下载区"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  prepare:
    name: Prepare Build Metadata
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.meta.outputs.timestamp }}
    steps:
      - name: Generate timestamp
        id: meta
        shell: bash
        run: echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows Installer
    needs: prepare
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'windows' }}
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache build environment
        uses: actions/cache@v4
        with:
          path: |
            .venv
            .build_cache
          key: windows-py310-${{ hashFiles('requirements.txt', 'requirements-build.txt') }}
          restore-keys: |
            windows-py310-

      - name: Create virtual environment
        shell: pwsh
        run: |
          if (!(Test-Path ".\.venv\Scripts\python.exe")) {
            python -m venv .venv
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $argsList = @(
            "tools\build_release.py",
            "--target", "windows",
            "--timestamp", "${{ needs.prepare.outputs.timestamp }}"
          )
          $version = "${{ github.event.inputs.version }}"
          if ($version) {
            $argsList += @("--version", $version)
          }
          .\.venv\Scripts\python.exe @argsList

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: 自动下单机器人-Windows-安装包-${{ needs.prepare.outputs.timestamp }}
          if-no-files-found: error
          path: |
            build/${{ needs.prepare.outputs.timestamp }}/Windows/installer/*.exe
            build/${{ needs.prepare.outputs.timestamp }}/Windows/发给别人看这里.txt

  build-mac:
    name: Build macOS Installer
    needs: prepare
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'mac' }}
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache build environment
        uses: actions/cache@v4
        with:
          path: |
            .venv
            .build_cache
          key: mac-py312-${{ hashFiles('requirements.txt', 'requirements-build.txt') }}
          restore-keys: |
            mac-py312-

      - name: Create virtual environment
        shell: bash
        run: |
          if [ ! -x ".venv/bin/python" ]; then
            python -m venv .venv
          fi

      - name: Build macOS installer
        shell: bash
        run: |
          args=(
            "tools/build_release.py"
            "--target" "mac"
            "--timestamp" "${{ needs.prepare.outputs.timestamp }}"
          )
          if [ -n "${{ github.event.inputs.version }}" ]; then
            args+=("--version" "${{ github.event.inputs.version }}")
          fi
          if [ "${{ inputs.build_mac_dmg }}" = "true" ]; then
            args+=("--mac-dmg")
          fi
          .venv/bin/python "${args[@]}"

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: 自动下单机器人-macOS-安装包-${{ needs.prepare.outputs.timestamp }}
          if-no-files-found: error
          path: |
            build/${{ needs.prepare.outputs.timestamp }}/mac/*.pkg
            build/${{ needs.prepare.outputs.timestamp }}/mac/*.dmg
            build/${{ needs.prepare.outputs.timestamp }}/mac/发给别人看这里.txt

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build-windows
      - build-mac
    if: >-
      ${{
        always() &&
        inputs.publish_release &&
        needs.prepare.result == 'success' &&
        (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
        (needs.build-mac.result == 'success' || needs.build-mac.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: 自动下单机器人-*-安装包-${{ needs.prepare.outputs.timestamp }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: installers-${{ needs.prepare.outputs.timestamp }}
          RELEASE_TITLE: 自动下单机器人安装包 ${{ needs.prepare.outputs.timestamp }}
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          自动下单机器人安装包

          - Windows：下载 .exe 安装程序。
          - macOS：默认下载 .pkg 安装包；只有运行工作流时勾选生成 DMG，才会额外附上 .dmg。
          - macOS 首次使用浏览器下单功能时需要联网下载 Chromium。
          EOF

          mapfile -d '' assets < <(find release-assets -type f \( -name '*.exe' -o -name '*.pkg' -o -name '*.dmg' \) -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No installer files found in downloaded artifacts." >&2
            find release-assets -type f >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --target "$GITHUB_SHA"
          fi
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
